<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Παρακολούθηση Χριστίνας & Γεωργίας</title>
    <!-- Χρήση Pico CSS για όμορφο και καθαρό σχεδιασμό αυτόματα -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <!-- Εισαγωγή Chart.js και Zoom Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        .chart-container { position: relative; height: 400px; width: 100%; margin-bottom: 3rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        th, td { text-align: center; font-size: 0.9rem; }
        .table-wrapper { overflow-x: auto; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <main class="container">
        <h2>Ανάπτυξη Διδύμων: Χριστίνα & Γεωργία</h2>
        
        <!-- Φόρμα Εισαγωγής -->
        <article>
            <form id="dataForm">
                <div class="grid">
                    <label>
                        Ημερομηνία Επίσκεψης
                        <input type="date" id="visitDate" required>
                    </label>
                </div>
                <div class="grid-2">
                    <label>
                        Βάρος Χριστίνας (kg)
                        <input type="number" step="0.01" id="cWeight" placeholder="π.χ. 4.5" required>
                    </label>
                    <label>
                        Βάρος Γεωργίας (kg)
                        <input type="number" step="0.01" id="gWeight" placeholder="π.χ. 4.3" required>
                    </label>
                </div>
                <button type="submit">Προσθήκη Επίσκεψης</button>
            </form>
        </article>

        <!-- Πίνακας Δεδομένων -->
        <div class="table-wrapper">
            <table role="grid">
                <thead>
                    <tr>
                        <th>Ημερομηνία</th>
                        <th>Χριστίνα (kg)</th>
                        <th>Αύξηση / Μέρα (Χ)</th>
                        <th>Γάλα Χριστίνας</th>
                        <th>Γεωργία (kg)</th>
                        <th>Αύξηση / Μέρα (Γ)</th>
                        <th>Γάλα Γεωργίας</th>
                        <th>Ενέργεια</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Τα δεδομένα θα μπουν εδώ μέσω JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Διαγράμματα -->
        <h3 style="text-align:center;">Συνολικό Βάρος (kg)</h3>
        <div class="chart-container">
            <canvas id="weightChart"></canvas>
        </div>

        <h3 style="text-align:center;">Αύξηση Βάρους ανά Ημέρα (γραμμάρια)</h3>
        <div class="chart-container">
            <canvas id="dailyDiffChart"></canvas>
        </div>

        <h3 style="text-align:center;">Εύρος Γάλακτος ανά Γεύμα (ml)</h3>
        <div class="chart-container">
            <canvas id="milkChart"></canvas>
        </div>
    </main>

    <script>
        // Αρχικοποίηση μεταβλητών και γραφημάτων
        let records = JSON.parse(localStorage.getItem('twinsData')) || [];
        let charts = {};

        const form = document.getElementById('dataForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const date = document.getElementById('visitDate').value;
            const cWeight = parseFloat(document.getElementById('cWeight').value);
            const gWeight = parseFloat(document.getElementById('gWeight').value);

            // Έλεγχος αν υπάρχει ήδη η ημερομηνία και ενημέρωση ή προσθήκη
            const existingIndex = records.findIndex(r => r.date === date);
            if(existingIndex >= 0) {
                records[existingIndex] = { date, cWeight, gWeight };
            } else {
                records.push({ date, cWeight, gWeight });
            }

            // Ταξινόμηση ανά ημερομηνία
            records.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('twinsData', JSON.stringify(records));
            
            form.reset();
            updateDashboard();
        });

        function deleteRecord(date) {
            records = records.filter(r => r.date !== date);
            localStorage.setItem('twinsData', JSON.stringify(records));
            updateDashboard();
        }

        // Επεξεργασία δεδομένων για τους υπολογισμούς
        function processData() {
            return records.map((rec, index) => {
                let data = { ...rec };
                
                // Υπολογισμός γάλακτος
                data.cMinMilk = Math.round(rec.cWeight * 160 / 8);
                data.cMaxMilk = Math.round(rec.cWeight * 180 / 8);
                data.gMinMilk = Math.round(rec.gWeight * 160 / 8);
                data.gMaxMilk = Math.round(rec.gWeight * 180 / 8);

                // Υπολογισμός αύξησης βάρους
                if (index > 0) {
                    const prev = records[index - 1];
                    const daysDiff = (new Date(rec.date) - new Date(prev.date)) / (1000 * 60 * 60 * 24);
                    const safeDays = daysDiff > 0 ? daysDiff : 1;

                    data.cDiffGrams = Math.round((rec.cWeight - prev.cWeight) * 1000);
                    data.cDailyGrams = Math.round(data.cDiffGrams / safeDays);
                    
                    data.gDiffGrams = Math.round((rec.gWeight - prev.gWeight) * 1000);
                    data.gDailyGrams = Math.round(data.gDiffGrams / safeDays);
                } else {
                    data.cDiffGrams = 0; data.cDailyGrams = 0;
                    data.gDiffGrams = 0; data.gDailyGrams = 0;
                }
                return data;
            });
        }

        function updateDashboard() {
            const processed = processData();
            updateTable(processed);
            updateCharts(processed);
        }

        function updateTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach((row, i) => {
                const formatDate = new Date(row.date).toLocaleDateString('el-GR');
                const cDiffText = i === 0 ? '-' : `+${row.cDiffGrams}g (${row.cDailyGrams}g/μέρα)`;
                const gDiffText = i === 0 ? '-' : `+${row.gDiffGrams}g (${row.gDailyGrams}g/μέρα)`;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${formatDate}</strong></td>
                    <td>${row.cWeight}</td>
                    <td>${cDiffText}</td>
                    <td>${row.cMinMilk} - ${row.cMaxMilk} ml</td>
                    <td>${row.gWeight}</td>
                    <td>${gDiffText}</td>
                    <td>${row.gMinMilk} - ${row.gMaxMilk} ml</td>
                    <td><button style="padding: 0.2rem 0.5rem; background: #d81b60; border: none;" onclick="deleteRecord('${row.date}')">X</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateCharts(data) {
            const labels = data.map(r => new Date(r.date).toLocaleDateString('el-GR'));

            const zoomOptions = {
                pan: { enabled: true, mode: 'xy' },
                zoom: {
                    wheel: { enabled: true },
                    pinch: { enabled: true },
                    mode: 'xy'
                }
            };

            // 1. Διάγραμμα Βάρους
            if (charts.weight) charts.weight.destroy();
            charts.weight = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Χριστίνα (kg)', data: data.map(r => r.cWeight), borderColor: '#8e24aa', backgroundColor: '#8e24aa', tension: 0.1 },
                        { label: 'Γεωργία (kg)', data: data.map(r => r.gWeight), borderColor: '#039be5', backgroundColor: '#039be5', tension: 0.1 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: zoomOptions } }
            });

            // 2. Διάγραμμα Αύξησης ανά Μέρα
            if (charts.dailyDiff) charts.dailyDiff.destroy();
            charts.dailyDiff = new Chart(document.getElementById('dailyDiffChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Χριστίνα (g/μέρα)', data: data.map(r => r.cDailyGrams), backgroundColor: 'rgba(142, 36, 170, 0.7)' },
                        { label: 'Γεωργία (g/μέρα)', data: data.map(r => r.gDailyGrams), backgroundColor: 'rgba(3, 155, 229, 0.7)' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: zoomOptions } }
            });

            // 3. Διάγραμμα Γάλακτος
            if (charts.milk) charts.milk.destroy();
            charts.milk = new Chart(document.getElementById('milkChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Χριστίνα Min', data: data.map(r => r.cMinMilk), borderColor: 'rgba(142, 36, 170, 0.5)', borderDash: [5, 5] },
                        { label: 'Χριστίνα Max', data: data.map(r => r.cMaxMilk), borderColor: '#8e24aa' },
                        { label: 'Γεωργία Min', data: data.map(r => r.gMinMilk), borderColor: 'rgba(3, 155, 229, 0.5)', borderDash: [5, 5] },
                        { label: 'Γεωργία Max', data: data.map(r => r.gMaxMilk), borderColor: '#039be5' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: zoomOptions } }
            });
        }

        // Φόρτωση κατά την πρώτη εκκίνηση
        updateDashboard();
    </script>
</body>
</html>
