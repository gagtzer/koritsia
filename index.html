<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Παρακολούθηση Χριστίνας & Γεωργίας</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        .chart-container { position: relative; height: 400px; width: 100%; margin-bottom: 3rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        th, td { text-align: center; font-size: 0.9rem; }
        .table-wrapper { overflow-x: auto; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <main class="container">
        <h2>Ανάπτυξη Διδύμων: Χριστίνα & Γεωργία</h2>
        
        <article>
            <form id="dataForm">
                <div class="grid">
                    <label>
                        Ημερομηνία Επίσκεψης
                        <input type="date" id="visitDate" required>
                    </label>
                </div>
                <div class="grid-2">
                    <label>
                        Βάρος Χριστίνας (kg)
                        <input type="number" step="0.001" id="cWeight" placeholder="π.χ. 4.500" required>
                    </label>
                    <label>
                        Βάρος Γεωργίας (kg)
                        <input type="number" step="0.001" id="gWeight" placeholder="π.χ. 4.300" required>
                    </label>
                </div>
                <button type="submit" id="submitBtn">Προσθήκη Επίσκεψης</button>
            </form>
        </article>

        <div class="table-wrapper">
            <table role="grid">
                <thead>
                    <tr>
                        <th>Ημερομηνία</th>
                        <th>Χριστίνα (kg)</th>
                        <th>Αύξηση / Μέρα (Χ)</th>
                        <th>Γάλα Χριστίνας</th>
                        <th>Γεωργία (kg)</th>
                        <th>Αύξηση / Μέρα (Γ)</th>
                        <th>Γάλα Γεωργίας</th>
                        <th>Ενέργεια</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8">Φόρτωση δεδομένων από το Cloud...</td></tr>
                </tbody>
            </table>
        </div>

        <h3 style="text-align:center;">Συνολικό Βάρος (kg)</h3>
        <div class="chart-container">
            <canvas id="weightChart"></canvas>
        </div>

        <h3 style="text-align:center;">Αύξηση Βάρους ανά Ημέρα (γραμμάρια)</h3>
        <div class="chart-container">
            <canvas id="dailyDiffChart"></canvas>
        </div>

        <h3 style="text-align:center;">Εύρος Γάλακτος ανά Γεύμα (ml)</h3>
        <div class="chart-container">
            <canvas id="milkChart"></canvas>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Οι δικές σας ρυθμίσεις Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDpDV_2TKGpycYYaTkVPKEu_r8dEB_C7HA",
            authDomain: "koritsia-d1e1d.firebaseapp.com",
            projectId: "koritsia-d1e1d",
            storageBucket: "koritsia-d1e1d.firebasestorage.app",
            messagingSenderId: "489728873948",
            appId: "1:489728873948:web:f3b376eb5d92072d94ab19",
            measurementId: "G-W7N3891XZY"
        };

        // Αρχικοποίηση Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let records = [];
        let charts = {};

        // Ακρόαση δεδομένων σε πραγματικό χρόνο από το Firestore (Ταξινομημένα ανά ημερομηνία)
        const q = query(collection(db, "visits"), orderBy("date", "asc"));
        onSnapshot(q, (snapshot) => {
            records = [];
            snapshot.forEach((doc) => {
                records.push(doc.data());
            });
            updateDashboard();
        });

        // Υποβολή νέας επίσκεψης ή ενημέρωση υπάρχουσας
        const form = document.getElementById('dataForm');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Αποθήκευση...";

            const date = document.getElementById('visitDate').value;
            const cWeight = parseFloat(document.getElementById('cWeight').value);
            const gWeight = parseFloat(document.getElementById('gWeight').value);

            try {
                // Χρησιμοποιούμε την ημερομηνία ως ID εγγράφου για να μην έχουμε διπλότυπα την ίδια μέρα
                await setDoc(doc(db, "visits", date), { date, cWeight, gWeight });
                form.reset();
            } catch (error) {
                console.error("Σφάλμα κατά την αποθήκευση: ", error);
                alert("Προέκυψε σφάλμα κατά την αποθήκευση. Ελέγξτε αν έχετε ενεργοποιήσει το Firestore σε Test Mode.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Προσθήκη Επίσκεψης";
            }
        });

        // Διαγραφή εγγραφής από το Firebase
        window.deleteRecord = async function(date) {
            if(confirm(`Θέλετε σίγουρα να διαγράψετε την επίσκεψη στις ${new Date(date).toLocaleDateString('el-GR')}?`)) {
                try {
                    await deleteDoc(doc(db, "visits", date));
                } catch (error) {
                    console.error("Σφάλμα κατά τη διαγραφή: ", error);
                }
            }
        }

        // Υπολογισμοί δεδομένων
        function processData() {
            return records.map((rec, index) => {
                let data = { ...rec };
                
                // Υπολογισμός εύρους γάλακτος
                data.cMinMilk = Math.round(rec.cWeight * 160 / 8);
                data.cMaxMilk = Math.round(rec.cWeight * 180 / 8);
                data.gMinMilk = Math.round(rec.gWeight * 160 / 8);
                data.gMaxMilk = Math.round(rec.gWeight * 180 / 8);

                // Υπολογισμός αύξησης βάρους σε σχέση με την προηγούμενη επίσκεψη
                if (index > 0) {
                    const prev = records[index - 1];
                    const daysDiff = (new Date(rec.date) - new Date(prev.date)) / (1000 * 60 * 60 * 24);
                    const safeDays = daysDiff > 0 ? daysDiff : 1;

                    data.cDiffGrams = Math.round((rec.cWeight - prev.cWeight) * 1000);
                    data.cDailyGrams = Math.round(data.cDiffGrams / safeDays);
                    
                    data.gDiffGrams = Math.round((rec.gWeight - prev.gWeight) * 1000);
                    data.gDailyGrams = Math.round(data.gDiffGrams / safeDays);
                } else {
                    data.cDiffGrams = 0; data.cDailyGrams = 0;
                    data.gDiffGrams = 0; data.gDailyGrams = 0;
                }
                return data;
            });
        }

        function updateDashboard() {
            const processed = processData();
            updateTable(processed);
            updateCharts(processed);
        }

        function updateTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8">Δεν υπάρχουν καταχωρημένες επισκέψεις.</td></tr>';
                return;
            }

            data.forEach((row, i) => {
                const formatDate = new Date(row.date).toLocaleDateString('el-GR');
                const cDiffText = i === 0 ? '-' : `+${row.cDiffGrams}g (${row.cDailyGrams}g/μ)`;
                const gDiffText = i === 0 ? '-' : `+${row.gDiffGrams}g (${row.gDailyGrams}g/μ)`;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${formatDate}</strong></td>
                    <td>${row.cWeight.toFixed(3)}</td>
                    <td>${cDiffText}</td>
                    <td>${row.cMinMilk} - ${row.cMaxMilk} ml</td>
                    <td>${row.gWeight.toFixed(3)}</td>
                    <td>${gDiffText}</td>
                    <td>${row.gMinMilk} - ${row.gMaxMilk} ml</td>
                    <td><button style="padding: 0.2rem 0.5rem; background: #d81b60; border: none; font-weight:bold;" onclick="deleteRecord('${row.date}')">X</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateCharts(data) {
            const labels = data.map(r => new Date(r.date).toLocaleDateString('el-GR'));

            const zoomOptions = {
                pan: { enabled: true, mode: 'xy' },
                zoom: {
                    wheel: { enabled: true },
                    pinch: { enabled: true },
                    mode: 'xy'
                }
            };

            // 1. Διάγραμμα Συνολικού Βάρους
            if (charts.weight) charts.weight.destroy();
            charts.weight = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Χριστίνα (kg)', data: data.map(r => r.cWeight), borderColor: '#8e24aa', backgroundColor: '#8e24aa', tension: 0.1 },
                        { label: 'Γεωργία (kg)', data: data.map(r => r.gWeight), borderColor: '#039be5', backgroundColor: '#039be5', tension: 0.1 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: zoomOptions } }
            });

            // 2. Διάγραμμα Αύξησης ανά Ημέρα
            if (charts.dailyDiff) charts.dailyDiff.destroy();
            charts.dailyDiff = new Chart(document.getElementById('dailyDiffChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Χριστίνα (g/μέρα)', data: data.map(r => r.cDailyGrams), backgroundColor: 'rgba(142, 36, 170, 0.7)' },
                        { label: 'Γεωργία (g/μέρα)', data: data.map(r => r.gDailyGrams), backgroundColor: 'rgba(3, 155, 229, 0.7)' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: zoomOptions } }
            });

            // 3. Διάγραμμα Γάλακτος
            if (charts.milk) charts.milk.destroy();
            charts.milk = new Chart(document.getElementById('milkChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Χριστίνα Min', data: data.map(r => r.cMinMilk), borderColor: 'rgba(142, 36, 170, 0.5)', borderDash: [5, 5] },
                        { label: 'Χριστίνα Max', data: data.map(r => r.cMaxMilk), borderColor: '#8e24aa' },
                        { label: 'Γεωργία Min', data: data.map(r => r.gMinMilk), borderColor: 'rgba(3, 155, 229, 0.5)', borderDash: [5, 5] },
                        { label: 'Γεωργία Max', data: data.map(r => r.gMaxMilk), borderColor: '#039be5' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { zoom: zoomOptions } }
            });
        }
    </script>
</body>
</html>
